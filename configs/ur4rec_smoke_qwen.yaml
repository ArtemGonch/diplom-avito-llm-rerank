# Smoke + Qwen2.5-7B-Instruct (open, no Llama gate) — UR4Rec §3.1 prompts
dataset:
  name: movielens-1m
  data_dir: data/movielens-1m
  history_len: 10
  num_candidates: 20
  num_negatives_cl: 5
  train_ratio: 0.8
  val_ratio: 0.1
  max_train_users: 200
  max_val_users: 50
  max_test_users: 50
  knowledge_items_only_in_samples: true

llm:
  backend: qwen
  use_template_generator: false
  # model_name: Qwen/Qwen2.5-7B-Instruct  # default for backend qwen
  load_in_4bit: true
  max_new_tokens: 128
  batch_size: 4
  # Smoke: LLM only for top-N ids (samples prioritized); rest = template fallback in train.
  knowledge_max_items: 250
  knowledge_max_users: 300
  temperature: 0.1
  checkpoint_every: 25
  knowledge_dir: data/movielens-1m/knowledge_qwen25

encoder:
  model_name: bert-base-uncased
  max_length: 128
  freeze: true

retriever:
  num_proxies: 8
  num_layers: 2
  dropout: 0.1
  pretrain_epochs: 1
  pretrain_lr: 1.0e-4
  pretrain_batch_size: 64
  alpha_cf: 1.0
  temperature: 0.05

backbone:
  name: dlcm
  hidden_dim: 768
  train_epochs: 1
  train_lr: 1.0e-4
  train_batch_size: 32

joint:
  epochs: 1
  lr: 1.0e-4
  batch_size: 32

seed: 42
device: cuda
gpu_id: 0
cudnn_benchmark: true
tf32: true
output_dir: checkpoints/ur4rec_smoke_qwen
