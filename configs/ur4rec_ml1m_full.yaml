# UR4Rec full reproduction — MovieLens-1M (paper §4)
# Knowledge: all users/items in train+val+test samples, no caps, Qwen 512 tokens.
# Estimated GPU time on V100: knowledge ~25-35h, train ~6-10h (see docs below).

dataset:
  name: movielens-1m
  data_dir: data/movielens-1m
  history_len: 10
  num_candidates: 100
  num_negatives_cl: 10
  train_ratio: 0.8
  val_ratio: 0.1
  # no max_* caps — full 6038 users / ~3883 items in samples
  knowledge_items_only_in_samples: true

llm:
  backend: qwen
  use_template_generator: false
  # model_name: Qwen/Qwen2.5-7B-Instruct  # default for qwen backend
  load_in_4bit: true
  max_new_tokens: 512          # paper-style longer knowledge (128 = smoke only)
  batch_size: 4                # raise to 8 if GPU memory allows (~2x faster)
  temperature: 0.1
  checkpoint_every: 50         # resume-friendly partial saves
  # separate dir from smoke cache (250 items / 300 users)
  knowledge_dir: data/movielens-1m/knowledge_qwen25_full

encoder:
  model_name: bert-base-uncased
  max_length: 256
  freeze: true

retriever:
  num_proxies: 8
  num_layers: 6
  dropout: 0.1
  pretrain_epochs: 3
  pretrain_lr: 1.0e-4
  pretrain_batch_size: 32
  alpha_cf: 1.0
  temperature: 0.05

backbone:
  name: dlcm
  hidden_dim: 768
  train_epochs: 5
  train_lr: 1.0e-4
  train_batch_size: 32

joint:
  epochs: 5
  lr: 1.0e-4
  batch_size: 32

seed: 42
device: cuda
gpu_id: 0
cudnn_benchmark: true
tf32: true
output_dir: checkpoints/ur4rec_ml1m_full
