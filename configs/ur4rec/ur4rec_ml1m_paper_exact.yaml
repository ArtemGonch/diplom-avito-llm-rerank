# UR4Rec ML-1M — paper-exact protocol (Appendix C + §4.4)
# k-core=5, MF top-100 candidates, InfoNCE max-proxies, DLCM listwise loss,
# per-item e_aug, backbone without aug then joint expand.

dataset:
  name: movielens-1m
  data_dir: data/movielens-1m
  history_len: 10
  num_candidates: 100
  num_negatives_cl: 10
  train_ratio: 0.8
  val_ratio: 0.1
  k_core: 5
  candidate_mode: mf_topk
  mf:
    dim: 64
    epochs: 30
  knowledge_items_only_in_samples: true

llm:
  backend: qwen
  use_template_generator: false
  load_in_4bit: true
  max_new_tokens: 512
  batch_size: 4
  num_shards: 4
  temperature: 0.1
  checkpoint_every: 50
  knowledge_dir: data/movielens-1m/knowledge_qwen25_full

encoder:
  model_name: bert-base-uncased
  max_length: 512
  freeze: true

retriever:
  num_proxies: 8
  num_layers: 6
  dropout: 0.1
  pretrain_epochs: 3
  pretrain_lr: 1.0e-4
  pretrain_batch_size: 32
  alpha_cf: 1.0
  temperature: 0.05

backbone:
  name: dlcm
  hidden_dim: 768
  train_epochs: 5
  train_lr: 1.0e-4
  train_batch_size: 32

joint:
  epochs: 5
  lr: 1.0e-4
  batch_size: 32

seed: 42
device: cuda
gpu_id: 0
cudnn_benchmark: true
tf32: true
output_dir: checkpoints/ur4rec_ml1m_paper_exact
