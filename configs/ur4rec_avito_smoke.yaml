# UR4Rec on Avito SERP parquet (smoke)
dataset:
  name: avito
  items_path: items_with_attrs.parquet
  users_path: users_with_history.parquet
  label_field: contacts
  min_serp_size: 10
  history_len: 10
  num_candidates: 20
  num_negatives_cl: 5
  train_ratio: 0.8
  val_ratio: 0.1
  max_train_serps: 400
  max_val_serps: 100
  max_test_serps: 100
  knowledge_items_only_in_samples: true

llm:
  backend: qwen
  use_template_generator: false
  load_in_4bit: true
  max_new_tokens: 128
  batch_size: 4
  knowledge_max_items: 300
  knowledge_max_users: 600
  temperature: 0.1
  checkpoint_every: 50
  knowledge_dir: data/avito/knowledge_qwen25

encoder:
  model_name: bert-base-uncased
  max_length: 128
  freeze: true

retriever:
  num_proxies: 8
  num_layers: 2
  dropout: 0.1
  pretrain_epochs: 1
  pretrain_lr: 1.0e-4
  pretrain_batch_size: 64
  alpha_cf: 1.0
  temperature: 0.05

backbone:
  name: dlcm
  hidden_dim: 768
  train_epochs: 1
  train_lr: 1.0e-4
  train_batch_size: 32

joint:
  epochs: 1
  lr: 1.0e-4
  batch_size: 32

seed: 42
device: cuda
gpu_id: 0
cudnn_benchmark: true
tf32: true
output_dir: checkpoints/ur4rec_avito_smoke
